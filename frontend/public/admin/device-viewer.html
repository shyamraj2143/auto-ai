<!--
  File: /frontend/public/admin/device-viewer.html
  Auto-AI admin device monitor standalone page.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto-AI Device Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f1a;
      --card: rgba(26, 26, 46, 0.78);
      --border: #2a2a4a;
      --text: #e0e0e0;
      --muted: #8a8aaa;
      --blue: #60a5fa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --orange: #fb923c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(96, 165, 250, 0.12), transparent 35%), var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button { font: inherit; }
    .shell { width: min(1440px, calc(100% - 28px)); margin: 0 auto; padding: 20px 0 40px; }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .back:hover { border-color: var(--blue); color: white; }
    h1 { margin: 14px 0 4px; font-size: clamp(24px, 3vw, 36px); letter-spacing: 0; }
    .muted { color: var(--muted); }
    .statusline { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 8px; font-size: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--red); display: inline-block; }
    .dot.online { background: var(--green); animation: breathe 1.5s ease-in-out infinite; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: flex-end; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 9px 13px;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); border-color: var(--blue); }
    .btn:disabled { cursor: not-allowed; opacity: 0.6; }
    .btn.green { background: rgba(52,211,153,0.16); border-color: rgba(52,211,153,0.45); color: #d1fae5; }
    .btn.orange { background: rgba(251,146,60,0.16); border-color: rgba(251,146,60,0.45); color: #fed7aa; }
    .btn.red { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.5); color: #fee2e2; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
    .tab {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      cursor: pointer;
      transition: 0.3s ease;
    }
    .tab.active { border-color: rgba(96,165,250,0.72); background: rgba(96,165,250,0.16); color: white; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(0,0,0,0.28);
      backdrop-filter: blur(16px);
      padding: 16px;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: slideUp 0.3s ease both;
    }
    .card.updated { border-color: rgba(52,211,153,0.75); box-shadow: 0 0 0 2px rgba(52,211,153,0.16), 0 18px 50px rgba(0,0,0,0.28); }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .device-title { min-width: 0; }
    .device-title strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 17px; color: white; }
    .device-title span { color: var(--muted); font-size: 13px; }
    .icon { width: 42px; height: 42px; border: 1px solid rgba(96,165,250,0.3); border-radius: 8px; display: grid; place-items: center; background: rgba(96,165,250,0.12); font-size: 22px; }
    .metric { margin: 12px 0; }
    .metric-row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; color: var(--muted); }
    .bar { height: 8px; margin-top: 7px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .bar > i { display: block; height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    .details { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
    .detail { min-width: 0; }
    .detail label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .detail span, .detail a { color: var(--text); font-size: 13px; word-break: break-word; }
    .detail a { color: #bfdbfe; text-decoration: none; }
    .warning { margin-top: 14px; border: 1px solid rgba(251,191,36,0.28); border-radius: 8px; background: rgba(251,191,36,0.1); color: #fde68a; padding: 10px; font-size: 13px; }
    .activity-box { margin-top: 14px; border: 1px solid var(--border); border-radius: 8px; background: rgba(15,15,26,0.35); padding: 10px; }
    .activity-box label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .activity-box div { display: flex; justify-content: space-between; gap: 10px; color: var(--text); font-size: 12px; }
    .activity-box span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .panel {
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: rgba(26,26,46,0.5);
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px;
    }
    .illustration { font-size: 54px; margin-bottom: 12px; }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--blue);
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    .toast-wrap { position: fixed; right: 16px; bottom: 16px; display: grid; gap: 10px; z-index: 40; max-width: min(420px, calc(100vw - 32px)); }
    .toast {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(15,15,26,0.92);
      color: white;
      padding: 12px 14px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.36);
      backdrop-filter: blur(14px);
      animation: slideUp 0.25s ease both;
    }
    .toast.green { border-color: rgba(52,211,153,0.5); }
    .toast.orange { border-color: rgba(251,146,60,0.5); }
    .toast.red { border-color: rgba(248,113,113,0.55); }
    .toast.blue { border-color: rgba(96,165,250,0.55); }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.68);
      padding: 18px;
    }
    .modal.open { display: flex; }
    .dialog {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111122;
      padding: 20px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.42);
    }
    .dialog h2 { margin: 0 0 8px; }
    .dialog p { margin: 0; color: var(--muted); line-height: 1.5; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes breathe { 50% { box-shadow: 0 0 0 8px rgba(52,211,153,0.1); } }
    @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 720px) {
      .shell { width: min(100% - 20px, 1440px); padding-top: 12px; }
      .topbar { display: block; }
      .actions { justify-content: flex-start; margin-top: 14px; }
      .grid { grid-template-columns: 1fr; }
      .details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <button class="back" id="backBtn" type="button">← Back to Users</button>
        <h1>User Device Dashboard</h1>
        <div class="muted" id="userLabel">Loading user...</div>
        <div class="statusline">
          <span class="dot" id="socketDot"></span>
          <span id="socketStatus">Connecting...</span>
          <span>Last updated: <strong id="lastUpdated">Never</strong></span>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" id="mobileTab" type="button">Mobile Devices (0)</button>
      <button class="tab" id="laptopTab" type="button">Laptop/Desktop Devices (0)</button>
    </nav>

    <section id="content">
      <div class="panel"><div><div class="spinner"></div><div>Loading devices...</div></div></div>
    </section>
  </main>

  <section class="toast-wrap" id="toasts"></section>

  <section class="modal" id="confirmModal" aria-modal="true" role="dialog">
    <div class="dialog">
      <h2 id="modalTitle">Confirm action</h2>
      <p id="modalText"></p>
      <div class="dialog-actions">
        <button class="btn" id="cancelModal" type="button">Cancel</button>
        <button class="btn" id="confirmModalBtn" type="button">Confirm</button>
      </div>
    </div>
  </section>

  <script>
    const params = new URLSearchParams(location.search);
    const requestedUserId = params.get("userId") || "";
    const API_BASE = (() => {
      const runtime = window.__AUTO_AI_API_URL__;
      if (runtime) return runtime.replace(/\/+$/, "");
      if (location.hostname === "localhost" || location.hostname === "127.0.0.1") return "http://localhost:8000/api/v1";
      return "https://auto-ai-production-c510.up.railway.app/api/v1";
    })();
    const WS_BASE = API_BASE.replace(/^http/i, "ws").replace(/\/api\/v1\/?$/, "");
    const token = localStorage.getItem("auto-ai-access-token") || localStorage.getItem("auto-ai-token") || "";
    const userLabel = params.get("label") || requestedUserId;
    const state = { devices: { mobile: [], laptop: [] }, activity: {}, commandStatus: {}, tab: "mobile", socket: null, socketConnected: false, liveDeviceStreamConnected: false, lastUpdatedAt: null, loadingToast: null, pendingAction: null, refreshTimer: null, canonicalUserId: requestedUserId };
    const els = {
      userLabel: document.getElementById("userLabel"),
      socketDot: document.getElementById("socketDot"),
      socketStatus: document.getElementById("socketStatus"),
      lastUpdated: document.getElementById("lastUpdated"),
      content: document.getElementById("content"),
      mobileTab: document.getElementById("mobileTab"),
      laptopTab: document.getElementById("laptopTab"),
      refreshBtn: document.getElementById("refreshBtn"),
      backBtn: document.getElementById("backBtn"),
      toasts: document.getElementById("toasts"),
      modal: document.getElementById("confirmModal"),
      modalTitle: document.getElementById("modalTitle"),
      modalText: document.getElementById("modalText"),
      confirmModalBtn: document.getElementById("confirmModalBtn"),
      cancelModal: document.getElementById("cancelModal")
    };

    function debounce(fn, delay = 300) {
      let timer = 0;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }
    function toast(message, type = "blue", timeout = 3000) {
      const item = document.createElement("div");
      item.className = `toast ${type}`;
      item.textContent = message;
      els.toasts.appendChild(item);
      if (timeout > 0) setTimeout(() => item.remove(), timeout);
      return item;
    }
    function updateConnectionStatus() {
      els.socketDot.classList.toggle("online", state.socketConnected);
      if (!state.socketConnected) {
        els.socketStatus.textContent = "Socket offline";
        return;
      }
      els.socketStatus.textContent = state.liveDeviceStreamConnected
        ? "Live device stream connected"
        : "Socket connected - Connected to server. Waiting for this user's device data...";
    }
    function setConnected(connected) {
      state.socketConnected = connected;
      if (!connected) state.liveDeviceStreamConnected = false;
      updateConnectionStatus();
      if (connected) console.log("Socket connected");
    }
    function setLastUpdated() {
      state.lastUpdatedAt = Date.now();
      els.lastUpdated.textContent = "Just now";
      setTimeout(updateClock, 1000);
    }
    function updateClock() {
      if (!state.lastUpdatedAt) return;
      const seconds = Math.max(0, Math.floor((Date.now() - state.lastUpdatedAt) / 1000));
      els.lastUpdated.textContent = seconds < 2 ? "Just now" : `${seconds}s ago`;
      if (seconds < 60) setTimeout(updateClock, 1000);
    }
    function headers() {
      return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
    }
    function handleHttpError(response) {
      if (response.status === 401) {
        location.href = "/admin/login";
        throw new Error("Unauthorized");
      }
      if (response.status === 404) throw new Error("User not found");
      if (response.status >= 500) throw new Error("Server error, please try again");
      throw new Error(`Request failed (${response.status})`);
    }
    function normalizeDevice(raw) {
      return {
        deviceId: raw.deviceId,
        deviceName: raw.deviceName || raw.deviceModel || "Unknown device",
        type: raw.type || "mobile",
        manufacturer: raw.manufacturer || null,
        model: raw.model || null,
        osVersion: raw.osVersion || "Unknown OS",
        appVersion: raw.appVersion || null,
        battery: raw.battery,
        charging: raw.charging,
        storageTotal: raw.storageTotal,
        storageUsed: raw.storageUsed,
        ramTotal: raw.ramTotal,
        ramUsed: raw.ramUsed,
        network: raw.network,
        currentApp: raw.currentApp,
        foregroundAppName: raw.foregroundAppName,
        foregroundPackageName: raw.foregroundPackageName,
        activityType: raw.activityType,
        activitySource: raw.activitySource,
        permissionGranted: Boolean(raw.permissionGranted),
        permissionsStatus: raw.permissionsStatus || {},
        fcmStatus: raw.fcmStatus || "missing",
        screenOn: raw.screenOn,
        lastActive: raw.lastActive || raw.timestamp || new Date().toISOString(),
        lastActivity: raw.lastActivity || null,
        location: raw.location,
        status: raw.status || (raw.isActive ? "online" : "offline"),
        cacheCleared: Boolean(raw.cacheCleared),
        lastCleanup: raw.lastCleanup || null
      };
    }
    function setDevices(data) {
      state.devices.mobile = (data.mobile || []).map(normalizeDevice);
      state.devices.laptop = (data.laptop || []).map(normalizeDevice);
      console.log(`✅ Devices loaded: ${state.devices.mobile.length} mobile, ${state.devices.laptop.length} laptop`);
      setLastUpdated();
      render();
      loadActivityForDevices();
    }
    async function loadDevices(showLoading = true) {
      if (!requestedUserId) {
        showError("User not found");
        return;
      }
      if (!token) {
        location.href = "/admin/login";
        return;
      }
      if (showLoading) {
        state.loadingToast = toast("🔄 Loading devices...", "blue", 0);
        state.devices = { mobile: [], laptop: [] };
        state.activity = {};
        state.commandStatus = {};
        render();
        els.content.innerHTML = '<div class="panel"><div><div class="spinner"></div><div>Loading devices...</div></div></div>';
      }
      try {
        const response = await fetch(`${API_BASE}/admin/users/${encodeURIComponent(requestedUserId)}/devices`, { headers: headers() });
        if (!response.ok) handleHttpError(response);
        const payload = await response.json();
        state.loadingToast?.remove();
        setDevices(payload.data || { mobile: [], laptop: [] });
      } catch (error) {
        state.loadingToast?.remove();
        state.devices = { mobile: [], laptop: [] };
        console.error(`❌ Error: ${error.message}`);
        showError(error.message || "🔌 Network error, retrying...");
      }
    }
    const debouncedLoadDevices = debounce(loadDevices, 300);
    function showError(message) {
      els.content.innerHTML = `<div class="panel"><div><div class="illustration">🔌</div><h2>${escapeHtml(message)}</h2><p class="muted">Network error, retrying...</p><button class="btn" id="retryBtn" type="button">Retry</button></div></div>`;
      document.getElementById("retryBtn").addEventListener("click", () => loadDevices(true));
      setTimeout(() => debouncedLoadDevices(false), 3000);
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }
    function parseGb(value) {
      const number = Number.parseFloat(String(value || "0"));
      return Number.isFinite(number) ? number : 0;
    }
    function percent(used, total) {
      const totalValue = parseGb(total);
      return totalValue > 0 ? Math.max(0, Math.min(100, Math.round((parseGb(used) / totalValue) * 100))) : 0;
    }
    function batteryColor(value) {
      if (value == null) return "var(--muted)";
      if (value > 50) return "var(--green)";
      if (value >= 20) return "var(--yellow)";
      return "var(--red)";
    }
    function isOnline(device) {
      return device.status === "online" && Date.now() - new Date(device.lastActive).getTime() <= 10000;
    }
    function render() {
      els.mobileTab.textContent = `Mobile Devices (${state.devices.mobile.length})`;
      els.laptopTab.textContent = `Laptop/Desktop Devices (${state.devices.laptop.length})`;
      els.mobileTab.classList.toggle("active", state.tab === "mobile");
      els.laptopTab.classList.toggle("active", state.tab === "laptop");
      const devices = state.devices[state.tab];
      if (!devices.length) {
        els.content.innerHTML = '<div class="panel"><div><div class="illustration">📭</div><h2>No registered devices found for this user.</h2><p class="muted">Only devices registered from real app sessions will appear here.</p></div></div>';
        return;
      }
      requestAnimationFrame(() => {
        els.content.innerHTML = `<div class="grid">${devices.slice(0, 50).map(deviceCard).join("")}</div>`;
        document.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => openConfirm(button.dataset.action, button.dataset.deviceId));
        });
      });
    }
    function deviceCard(device) {
      const battery = device.battery == null ? null : Math.round(device.battery);
      const storage = percent(device.storageUsed, device.storageTotal);
      const ram = percent(device.ramUsed, device.ramTotal);
      const online = isOnline(device);
      const lat = device.location?.lat;
      const lng = device.location?.lng;
      const activity = state.activity[device.deviceId] || {};
      const permissions = activity.permissionsStatus || device.permissionsStatus || {};
      const activityAllowed = Boolean(activity.permissionGranted || device.permissionGranted || permissions.usageAccess || permissions.usage_stats || permissions.accessibility);
      const currentApp = activity.currentForegroundApp || device.foregroundAppName || device.currentApp;
      return `
        <article class="card" id="device-${escapeHtml(device.deviceId)}">
          <div class="card-head">
            <div class="icon">${device.type === "mobile" ? "📱" : "💻"}</div>
            <div class="device-title"><strong>${escapeHtml(device.deviceName)}</strong><span>${escapeHtml([device.manufacturer, device.model].filter(Boolean).join(" ") || device.osVersion)}${device.appVersion ? " · App " + escapeHtml(device.appVersion) : ""}</span></div>
            <span class="dot ${online ? "online" : ""}" title="${online ? "Online" : "Offline"}"></span>
          </div>
          ${metric("Battery", battery == null ? "Unknown" : `${battery}%`, battery == null ? 0 : battery, batteryColor(battery))}
          ${metric("Storage", `${escapeHtml(device.storageUsed || "Unknown")} / ${escapeHtml(device.storageTotal || "Unknown")}`, storage, "var(--blue)")}
          ${metric("RAM", `${escapeHtml(device.ramUsed || "Unknown")} / ${escapeHtml(device.ramTotal || "Unknown")}`, ram, "#a78bfa")}
          <div class="details">
            ${detail("Network", device.network)}
            ${detail("Charging", device.charging == null ? "Unknown" : device.charging ? "Yes" : "No")}
            ${detail("Current app", activityAllowed ? currentApp || "No recent activity" : "Permission not granted")}
            ${detail("Screen", device.screenOn == null ? "Unknown" : device.screenOn ? "ON" : "OFF")}
            ${detail("Status", online ? "Online" : "Offline")}
            ${detail("FCM", device.fcmStatus)}
            ${detail("Command", state.commandStatus[device.deviceId] || "None")}
            ${detail("Last active", Date.now() - new Date(device.lastActive).getTime() <= 5000 ? "Active Now" : new Date(device.lastActive).toLocaleString())}
            ${detail("Last activity", activity.lastActivityAt ? new Date(activity.lastActivityAt).toLocaleString() : "Unavailable")}
            <div class="detail"><label>Location</label>${lat != null && lng != null ? `<a href="https://maps.google.com/?q=${lat},${lng}" target="_blank" rel="noreferrer">${Number(lat).toFixed(4)}, ${Number(lng).toFixed(4)}</a>` : "<span>Unavailable</span>"}</div>
            ${detail("Cache cleared", device.cacheCleared ? "Yes" : "No")}
            ${detail("Last cleanup", device.lastCleanup ? new Date(device.lastCleanup).toLocaleString() : "Never")}
          </div>
          ${activityAllowed ? activitySummary(activity) : '<div class="warning">Activity permission not granted on this device.</div>'}
          <div class="card-actions">
            <button class="btn green" data-action="remote-start" data-device-id="${escapeHtml(device.deviceId)}" type="button">Remote Start</button>
            <button class="btn orange" data-action="ai-clean" data-device-id="${escapeHtml(device.deviceId)}" type="button">AI Data Clean</button>
          </div>
        </article>`;
    }
    function metric(label, value, width, color) {
      return `<div class="metric"><div class="metric-row"><span>${label}</span><span>${value}</span></div><div class="bar"><i style="width:${width}%;background:${color}"></i></div></div>`;
    }
    function detail(label, value) {
      return `<div class="detail"><label>${label}</label><span>${escapeHtml(value || "Unknown")}</span></div>`;
    }
    function activitySummary(activity) {
      const rows = (activity.usageSummary || []).slice(0, 3).map((item) => `<div><span>${escapeHtml(item.app)}</span><b>${Number(item.events || 0)}</b></div>`).join("");
      return rows ? `<div class="activity-box"><label>Recent activity</label>${rows}</div>` : "";
    }
    function allDevices() {
      return [...state.devices.mobile, ...state.devices.laptop];
    }
    async function loadActivityForDevices() {
      const devices = allDevices().slice(0, 50);
      const entries = await Promise.allSettled(devices.map(async (device) => {
        const response = await fetch(`${API_BASE}/admin/users/${encodeURIComponent(requestedUserId)}/devices/${encodeURIComponent(device.deviceId)}/activity`, { headers: headers() });
        if (!response.ok) return null;
        return response.json();
      }));
      entries.forEach((entry) => {
        if (entry.status === "fulfilled" && entry.value?.deviceId) state.activity[entry.value.deviceId] = entry.value;
      });
      render();
    }
    function openConfirm(action, deviceId) {
      const device = allDevices().find((item) => item.deviceId === deviceId);
      if (!device) return;
      state.pendingAction = { action, device };
      const start = action === "remote-start";
      els.modalTitle.textContent = start ? "Remote start device" : "AI data clean";
      els.modalText.textContent = `Are you sure you want to ${start ? "remote start" : "clean AI data on"} ${device.deviceName}?`;
      els.confirmModalBtn.className = `btn ${start ? "green" : "red"}`;
      els.confirmModalBtn.disabled = false;
      els.modal.classList.add("open");
    }
    async function runPendingAction() {
      const pending = state.pendingAction;
      if (!pending) return;
      const { action, device } = pending;
      els.confirmModalBtn.disabled = true;
      try {
        const path = action === "remote-start"
          ? `users/${encodeURIComponent(requestedUserId)}/devices/${encodeURIComponent(device.deviceId)}/remote-start`
          : `ai-clean/${encodeURIComponent(requestedUserId)}/${encodeURIComponent(device.deviceId)}`;
        const response = await fetch(`${API_BASE}/admin/${path}`, { method: "POST", headers: headers() });
        if (!response.ok) handleHttpError(response);
        const result = await response.json();
        if (action === "remote-start") {
          if ((result.sent || 0) <= 0) throw new Error(result.message || "Remote start was not delivered");
          console.log(`🚀 Remote start triggered for ${device.deviceId}`);
          toast(`Remote start ${result.commandStatus || "sent"} for ${device.deviceName}`, "green", 3000);
        } else {
          console.log(`🧹 AI clean triggered for ${device.deviceId}`);
          toast(`🧹 AI data cleaned for ${device.deviceName}`, "orange", 3000);
        }
        els.modal.classList.remove("open");
        debouncedLoadDevices(false);
      } catch (error) {
        console.error(`❌ Error: ${error.message}`);
        toast("❌ Failed to send command", "red", 4000);
      } finally {
        els.confirmModalBtn.disabled = false;
      }
    }
    function connectSocket() {
      if (!token || !requestedUserId) return;
      const url = `${WS_BASE}/api/v1/admin/device-stream?token=${encodeURIComponent(token)}&user_id=${encodeURIComponent(requestedUserId)}`;
      state.socket?.close();
      state.socket = new WebSocket(url);
      state.socket.onopen = () => setConnected(true);
      state.socket.onclose = () => {
        setConnected(false);
        setTimeout(connectSocket, 2500);
      };
      state.socket.onerror = () => setConnected(false);
      state.socket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === "ready") {
          state.canonicalUserId = payload.userId || requestedUserId;
          setConnected(true);
          return;
        }
        const eventUserId = payload.userId || payload.data?.userId;
        if (eventUserId && eventUserId !== state.canonicalUserId && eventUserId !== requestedUserId) return;
        if (payload.type === "command-update" && payload.deviceId && payload.commandStatus) {
          state.commandStatus[payload.deviceId] = payload.commandStatus;
          render();
          return;
        }
        if (payload.type === "initial-data" && payload.data) {
          setDevices(payload.data);
          return;
        }
        if (payload.type !== "device-update" || !payload.data) return;
        const device = normalizeDevice(payload.data);
        if (!device.deviceId) return;
        state.liveDeviceStreamConnected = true;
        updateConnectionStatus();
        console.log(`📡 Real-time update received for ${device.deviceId}`);
        const bucket = device.type === "laptop" ? "laptop" : "mobile";
        state.devices[bucket] = [device, ...state.devices[bucket].filter((item) => item.deviceId !== device.deviceId)];
        fetch(`${API_BASE}/admin/users/${encodeURIComponent(requestedUserId)}/devices/${encodeURIComponent(device.deviceId)}/activity`, { headers: headers() })
          .then((response) => response.ok ? response.json() : null)
          .then((activity) => { if (activity?.deviceId) state.activity[activity.deviceId] = activity; render(); })
          .catch(() => {});
        setLastUpdated();
        render();
        requestAnimationFrame(() => {
          const card = document.getElementById(`device-${CSS.escape(device.deviceId)}`);
          if (!card) return;
          card.classList.add("updated");
          setTimeout(() => card.classList.remove("updated"), 1000);
        });
      };
    }
    els.mobileTab.addEventListener("click", () => { state.tab = "mobile"; render(); });
    els.laptopTab.addEventListener("click", () => { state.tab = "laptop"; render(); });
    els.refreshBtn.addEventListener("click", () => loadDevices(true));
    els.backBtn.addEventListener("click", () => { location.href = "/admin?section=users"; });
    els.cancelModal.addEventListener("click", () => els.modal.classList.remove("open"));
    els.confirmModalBtn.addEventListener("click", runPendingAction);
    els.userLabel.textContent = userLabel ? `User: ${userLabel}` : "User not found";
    state.refreshTimer = setInterval(() => {
      if (!state.devices.mobile.length && !state.devices.laptop.length) debouncedLoadDevices(false);
    }, 5000);
    loadDevices(true);
    connectSocket();
  </script>
</body>
</html>
